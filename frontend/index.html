<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jeopardy!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ==================== SETUP SCREEN ==================== -->
  <div id="setup-screen" class="screen active">
    <div class="setup-container">
      <div class="logo-wrap">
        <h1 class="logo">JEOPARDY!</h1>
        <p class="logo-sub">The Classic Trivia Game</p>
      </div>
      <div class="setup-card">
        <h2>Start New Game</h2>
        <div class="form-group">
          <label>Your Name</label>
          <input type="text" id="player-name" placeholder="Enter your name" maxlength="20"/>
        </div>
        <div class="form-group">
          <label>AI Difficulty</label>
          <div class="difficulty-btns">
            <button class="diff-btn active" data-diff="easy">Easy</button>
            <button class="diff-btn" data-diff="medium">Medium</button>
            <button class="diff-btn" data-diff="hard">Hard</button>
          </div>
        </div>
        <button id="start-btn" class="primary-btn">Start Game</button>
        <div id="setup-error" class="error-msg"></div>
      </div>
      <div id="loading-overlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p id="loading-text">Fetching questions...</p>
      </div>
    </div>
  </div>

  <!-- ==================== GAME SCREEN ==================== -->
  <div id="game-screen" class="screen">
    <div class="scoreboard">
      <div id="scores-row" class="scores-row"></div>
      <div class="round-info">Round <span id="round-num">1</span> / 25</div>
    </div>
    <div class="board-wrap">
      <div id="board" class="board"></div>
    </div>
  </div>

  <!-- ==================== QUESTION MODAL ==================== -->
  <div id="question-modal" class="modal hidden">
    <div class="modal-inner">
      <div class="modal-header">
        <span id="modal-category"></span>
        <span id="modal-value" class="modal-value"></span>
      </div>
      <div id="modal-question" class="modal-question"></div>
      <div id="modal-answers" class="modal-answers"></div>
      <div id="modal-result" class="modal-result hidden"></div>
      <div id="modal-bot-results" class="modal-bot-results hidden"></div>
      <button id="modal-continue" class="primary-btn hidden">Continue</button>
    </div>
  </div>

  <!-- ==================== GAME OVER SCREEN ==================== -->
  <div id="gameover-screen" class="screen">
    <div class="gameover-container">
      <h1 class="gameover-title">GAME OVER</h1>
      <div id="winner-display" class="winner-display"></div>
      <div id="final-scores" class="final-scores"></div>
      <button id="play-again-btn" class="primary-btn">Play Again</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
