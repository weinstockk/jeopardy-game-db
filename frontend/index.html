<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jeopardy!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ==================== SETUP SCREEN ==================== -->
  <div id="setup-screen" class="screen active">
    <div class="setup-container">
      <div class="logo-wrap">
        <h1 class="logo">JEOPARDY!</h1>
        <p class="logo-sub">The Classic Trivia Game</p>
      </div>
      <div class="setup-card">
        <h2>Start New Game</h2>
        <div class="form-group">
          <label>Your Name</label>
          <input type="text" id="player-name" placeholder="Enter your name" maxlength="20"/>
        </div>
        <div class="form-group">
          <label>AI Difficulty</label>
          <div class="difficulty-btns">
            <button class="diff-btn active" data-diff="easy">Easy</button>
            <button class="diff-btn" data-diff="medium">Medium</button>
            <button class="diff-btn" data-diff="hard">Hard</button>
          </div>
        </div>
        <button id="start-btn" class="primary-btn">Start Game</button>
        <button id="load-game-btn" class="secondary-btn">Resume Game</button>
        <button id="history-btn" class="secondary-btn">View History</button>
        <div id="setup-error" class="error-msg"></div>
      </div>
      <div id="loading-overlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p id="loading-text">Fetching questions...</p>
      </div>
    </div>
  </div>

  <!-- ==================== LOAD GAME SCREEN ==================== -->
  <div id="load-game-screen" class="screen">
    <div class="setup-container">
      <div class="logo-wrap">
        <h1 class="logo" style="font-size:3rem">Resume Game</h1>
      </div>
      <div class="setup-card">
        <div id="load-game-list"></div>
        <button id="back-to-setup-btn" class="secondary-btn" style="margin-top:1rem">← Back</button>
      </div>
    </div>
  </div>

  <!-- ==================== HISTORY SCREEN ==================== -->
  <div id="history-screen" class="screen">
    <div class="setup-container">
      <div class="logo-wrap">
        <h1 class="logo" style="font-size:3rem">History</h1>
      </div>
      <div class="setup-card">
        <div id="history-list"></div>
        <button id="back-from-history-btn" class="secondary-btn" style="margin-top:1rem">← Back</button>
      </div>
    </div>
  </div>

  <!-- ==================== GAME SCREEN ==================== -->
  <div id="game-screen" class="screen">
    <div class="scoreboard">
      <div id="scores-row" class="scores-row"></div>
      <div class="round-info">Round <span id="round-num">1</span> / 25</div>
    </div>
    <div class="board-wrap">
      <div id="board" class="board"></div>
    </div>
  </div>

  <!-- ==================== QUESTION MODAL ==================== -->
  <div id="question-modal" class="modal hidden">
    <div class="modal-inner">
      <div class="modal-header">
        <span id="modal-category"></span>
        <span id="modal-value" class="modal-value"></span>
      </div>
      <div id="modal-question" class="modal-question"></div>

      <!-- BUZZER PHASE -->
      <div id="buzzer-phase" class="buzzer-phase hidden">
        <div id="buzz-timer-bar-wrap"><div id="buzz-timer-bar"></div></div>
        <div id="buzz-timer-text" class="buzz-timer-text">5.0s</div>
        <div id="buzz-status" class="buzz-status">Be the first to buzz in!</div>
        <button id="buzz-btn" class="buzz-btn">⚡ BUZZ IN</button>
      </div>

      <!-- ANSWER PHASE (shown after player buzzes first) -->
      <div id="answer-phase" class="hidden">
        <p class="answer-prompt">You buzzed first! Choose your answer:</p>
        <div id="modal-answers" class="modal-answers"></div>
      </div>

      <!-- RESULT PHASE -->
      <div id="modal-result" class="modal-result hidden"></div>
      <div id="modal-results-list" class="modal-bot-results hidden"></div>
      <button id="modal-continue" class="primary-btn hidden">Continue</button>
    </div>
  </div>

  <!-- ==================== DAILY DOUBLE MODAL ==================== -->
  <div id="dd-modal" class="modal hidden">
    <div class="modal-inner dd-inner">
      <div class="dd-banner">⭐ DAILY DOUBLE ⭐</div>
      <div id="dd-category" class="dd-category"></div>

      <!-- WAGER PHASE -->
      <div id="dd-wager-phase">
        <div id="dd-score-display" class="dd-score-display"></div>
        <div class="form-group" style="margin-top:1rem">
          <label>Your Wager</label>
          <input type="number" id="dd-wager-input" min="0" placeholder="Enter wager"/>
        </div>
        <button id="dd-confirm-wager-btn" class="primary-btn">Confirm Wager</button>
      </div>

      <!-- QUESTION PHASE -->
      <div id="dd-question-phase" class="hidden">
        <div id="dd-question" class="modal-question"></div>
        <div id="dd-answers" class="modal-answers"></div>
      </div>

      <!-- RESULT PHASE -->
      <div id="dd-result" class="modal-result hidden"></div>
      <button id="dd-continue-btn" class="primary-btn hidden">Continue</button>
    </div>
  </div>

  <!-- ==================== FINAL JEOPARDY SCREEN ==================== -->
  <div id="final-screen" class="screen">
    <div class="final-container">
      <div class="final-title">FINAL JEOPARDY</div>

      <!-- WAGER PHASE -->
      <div id="final-wager-phase" class="final-card">
        <div id="final-score-display" class="dd-score-display"></div>
        <p class="final-hint">Place your wager before the question is revealed.</p>
        <div class="form-group" style="margin-top:1rem">
          <label>Your Wager (0 – your score)</label>
          <input type="number" id="final-wager-input" min="0" placeholder="Enter wager"/>
        </div>
        <button id="final-confirm-wager-btn" class="primary-btn">Reveal Question</button>
      </div>

      <!-- QUESTION PHASE -->
      <div id="final-question-phase" class="final-card hidden">
        <div id="final-question" class="modal-question" style="font-size:1.4rem;margin-bottom:1.5rem"></div>
        <div id="final-answers" class="modal-answers"></div>
        <button id="final-submit-btn" class="primary-btn hidden">Submit Answer</button>
      </div>

      <!-- REVEAL PHASE -->
      <div id="final-reveal-phase" class="final-card hidden">
        <div class="final-reveal-title">Results</div>
        <div id="final-correct-answer" class="final-correct-answer"></div>
        <div id="final-reveal-list"></div>
        <button id="final-end-btn" class="primary-btn" style="margin-top:1.5rem">See Final Scores</button>
      </div>
    </div>
  </div>

  <!-- ==================== GAME OVER SCREEN ==================== -->
  <div id="gameover-screen" class="screen">
    <div class="gameover-container">
      <h1 class="gameover-title">GAME OVER</h1>
      <div id="winner-display" class="winner-display"></div>
      <div id="final-scores" class="final-scores"></div>
      <button id="play-again-btn" class="primary-btn">Play Again</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
